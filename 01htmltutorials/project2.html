<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>UNIVERSITY REGISTRATION FORM</h1>
    <p>Please fill out the form</p>
    <hr>
    <form>
        <h2>Personal Details</h2>
        <label for="fname">First Name:</label>
        <input type="text" name="userName" id="fname" placeholder="e.g-Ridhi" required>
        <br><br>
        <label for="lname">Last Name:</label>
        <input type="text" name="userSurName" id="lname" placeholder="e.g-Yela">
        <br><br>
        <label for="dob">Date of Birth:</label>
        <input type="date" name="DoB" id="dob">
        <br><br>
        <label>Gender</label>
        <br>
        <label for="male">Male</label>
        <input type="radio" name="gender" id="male" value="Male">
        <br>
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" value="Female">
        <br>
        <label for="other">Other</label>
        <input type="radio" name="gender" id="other" value="Other">
        <br><br>
        <h3>Upload your Photo</h3>
        <input type="file" name="file">
        <hr>
        <h2>Contact Information</h2>
        <label for="email">Email Address</label>
        <input type="email" name="Email" id="email" placeholder="yridhi@gmail.com">
        <br><br>
        <label for="phone">Phone Number</label>
        <input type="tel" name="PhoneNo" id="phone" placeholder="9876543210">
        <br><br>
        <label for="address">Mailing Address</label><br>
        <textarea name="Address" id="address" rows="5" cols="50" placeholder="Street Address, City, State"></textarea>
        <hr>
        <h2>Academic Information</h2>
        <label for="course">Select your Course:</label>
        <br>
        <select name="Course" id="course">
            <option value="CSE">CSE</option>
            <option value="ECE">ECE</option>
            <option value="EEE">EEE</option>
            <option value="MECH">MECH</option>
            <option value="Civil">CIVIL</option>
        </select>
        <br><br>
        <h3>ExtraCurricular Intrests<h3>

        <label for="sport">Sports</label>
        <input type="checkbox" name="Activities" id="sport" value="Sports"><br>
        <label for="singing">Music and Arts</label>
        <input type="checkbox" name="Activities" id="singing" value="Music&Arts"><br>
        <label for="tech">Technology Clubs</label>
        <input type="checkbox" name="Activities" id="tech" value="Technology Clubs"><br>
        
        <hr>
        <h2>Create Your Account</h2>
        <label for="pass">Create a Password:</label>
        <input type="password" name="Password" id="pass">
        <br><br>
        <label for="safe">Security Question:</label>
        <br>
        <select name="Hint" id="safe">
            <option value="Pet Name">Pet Name</option>
            <option value="Car Brand">Car Brand</option>
            <option value="Tourist Place">Tourist Place</option>
        </select>
        <br><br>
        <label for="safeans">Security Answer:</label>
        <input type="text" name="Security" id="safeans">
        <br><br>
        <label for="yes">I agree for Terms and Conditions</label>
        <input type="checkbox" name="agreed" id="yes">
        <hr>
        <button type="submit">Register</button>
        <button type="reset">Clear Form</button>


    </form>
</body>
</html>
